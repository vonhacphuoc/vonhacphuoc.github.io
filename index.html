    <!-- Consent Logic -->
    <script>
      function acceptAllConsent() {
        gtag('consent', 'update', {
          'ad_user_data': 'granted',
          'ad_personalization': 'granted',
          'ad_storage': 'granted',
          'analytics_storage': 'granted'
        });
        localStorage.setItem('consent_choice', 'granted');
        hideBanner();
      }

      function rejectAllConsent() {
        gtag('consent', 'update', {
          'ad_user_data': 'denied',
          'ad_personalization': 'denied',
          'ad_storage': 'denied',
          'analytics_storage': 'denied'
        });
        localStorage.setItem('consent_choice', 'denied');
        hideBanner();
      }

      function hideBanner() {
        var b = document.getElementById('cookie-banner');
        if (b) { b.style.animation = 'none'; b.style.display = 'none'; }
      }

      // Chỉ hiện banner nếu chưa chọn
      (function() {
        if (!localStorage.getItem('consent_choice')) {
          var b = document.getElementById('cookie-banner');
          if (b) b.classList.add('show');
        }
      })();
    </script>
