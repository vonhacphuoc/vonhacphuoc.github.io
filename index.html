      // Nếu user đã chấp nhận trước đó → khôi phục consent
      (function() {
        var saved = localStorage.getItem('consent_choice');
        if (saved === 'granted') {

            'ad_storage': 'granted',

            'ad_storage': 'denied',
            'ad_user_data': 'denied',
            'ad_personalization': 'denied',
            'analytics_storage': 'denied'
          });
        }
      })();

    <!-- Cookie Consent Banner Styles -->
    <style>
      #cookie-banner {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 99999;
        background: rgba(20, 20, 30, 0.97);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 16px 24px;
        font-family: 'Inter', sans-serif;
        animation: slideUp 0.4s ease;
      }
      #cookie-banner.show { display: flex; }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0);   opacity: 1; }
      }
      .cookie-inner {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .cookie-text {
        flex: 1;
        min-width: 220px;
        color: #ccc;
        font-size: 13.5px;
        line-height: 1.5;
      }
      .cookie-text strong { color: #fff; }
      .cookie-btns { display: flex; gap: 10px; flex-shrink: 0; }
      .btn-accept {
        background: linear-gradient(135deg, #a855f7, #ec4899);
        color: #fff;
        border: none;
        padding: 9px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-accept:hover { opacity: 0.88; }
      .btn-reject {
        background: transparent;
        color: #999;
        border: 1px solid rgba(255,255,255,0.15);
        padding: 9px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-reject:hover { color: #fff; border-color: rgba(255,255,255,0.35); }
    </style>

  <body class="min-h-screen pb-32">
    <div id="root"></div>

    <!-- Cookie Consent Banner -->
    <div id="cookie-banner" role="dialog" aria-label="Cookie consent">
      <div class="cookie-inner">
        <p class="cookie-text">
          🍪 <strong>Chart Móc Len</strong> dùng cookie để phân tích lưu lượng và hiển thị quảng cáo phù hợp.
          Bạn có đồng ý không?
        </p>
        <div class="cookie-btns">
          <button id="btn-accept-all" class="btn-accept" onclick="acceptAllConsent()">Chấp nhận tất cả</button>
          <button id="btn-reject-all" class="btn-reject" onclick="rejectAllConsent()">Từ chối</button>
        </div>
      </div>
    </div>

    <!-- Consent Logic -->
    <script>
      function acceptAllConsent() {
        gtag('consent', 'update', {
          'ad_user_data': 'granted',
          'ad_personalization': 'granted',
          'ad_storage': 'granted',
          'analytics_storage': 'granted'
        });
        localStorage.setItem('consent_choice', 'granted');
        hideBanner();
      }

      function rejectAllConsent() {
        gtag('consent', 'update', {
          'ad_user_data': 'denied',
          'ad_personalization': 'denied',
          'ad_storage': 'denied',
          'analytics_storage': 'denied'
        });
        localStorage.setItem('consent_choice', 'denied');
        hideBanner();
      }

      function hideBanner() {
        var b = document.getElementById('cookie-banner');
        if (b) { b.style.animation = 'none'; b.style.display = 'none'; }
      }

      // Chỉ hiện banner nếu chưa chọn
      (function() {
        if (!localStorage.getItem('consent_choice')) {
          var b = document.getElementById('cookie-banner');
          if (b) b.classList.add('show');
        }
      })();
    </script>
  </body>
